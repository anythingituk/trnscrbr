name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore .\Trnscrbr.sln

      - name: Build
        run: dotnet build .\Trnscrbr.sln --configuration Release --no-restore

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Publish and package
        shell: pwsh
        run: .\scripts\publish-win-x64.ps1 -BuildInstaller

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Trnscrbr-Setup-win-x64
          path: artifacts/installer/*.exe
